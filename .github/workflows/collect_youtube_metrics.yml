name: 📊 Collect YouTube Metrics

on:
  schedule:
    - cron: "0 15 * * *"   # 매일 KST 자정 (UTC 15:00)
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📊 유튜브 메트릭 수집 트리거
        env:
          ADMIN_BASE_URL: ${{ secrets.ADMIN_BASE_URL }}
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
        run: |
          if [ -z "$ADMIN_BASE_URL" ]; then
            echo "⚠️ ADMIN_BASE_URL 미설정, 건너뜀"
            exit 0
          fi
          HTTP_STATUS=$(curl -s -o /tmp/res.json -w "%{http_code}" \
            -X POST \
            -H "X-Internal-Token: $INTERNAL_API_TOKEN" \
            "$ADMIN_BASE_URL/internal/collect-metrics")
          cat /tmp/res.json
          [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ] && echo "✅ 완료" || exit 1
