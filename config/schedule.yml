# config/schedule.yml
# briefing_type/video_format 및 이 레포의 실행 창(window)을 정의한다.
# pipeline/config_schedule.py가 이 파일을 로드해 상수로 노출한다.

briefing_type: report_update   # morning_core | report_update

window:
  start: "09:20"   # 이 시각 이전에 트리거되면 비정상(모니터링 기준)
  end:   "10:20"   # 이 시각을 넘겨 완료되면 SLA 위반으로 로그에 경고 표시

# video_format(길이 티어) 결정은 이제 이 레포가 아니라 stock-briefing-v3-2
# (analyzer/report_update_analyzer.py의 decide_length_tier())가 리포트
# 핵심종목 수 기준으로 미리 결정해 data/briefing_data.json에 실어 보낸다.
# 이 레포는 그 값을 그대로 신뢰해 사용할 뿐 재계산하지 않는다
# (예전 pipeline/report_decision.py의 shorts/longform 이진 판단은 폐기됨).

duration:
  full:
    min_seconds: 480    # 8분
    max_seconds: 900    # 15분
  mid:
    min_seconds: 300    # 5분
    max_seconds: 480    # 8분
  shorts:
    min_seconds: 30
    max_seconds: 60

# script.json에 video_format이 없을 때(비정상 상황)의 안전한 폴백 —
# 콘텐츠가 부족할 때 억지로 길게 늘리는 위험을 피하기 위해 가장 짧은
# 티어로 폴백한다.
default_video_format: shorts
