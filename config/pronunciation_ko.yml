# config/pronunciation_ko.yml
# 종목명/영어 약어/숫자 표현의 TTS 발음 교정 사전. narration 텍스트에만
# 적용하고 subtitle(화면 자막)에는 절대 적용하지 않는다.
#
# 원래 pipeline/voice_config.py에 파이썬 리스트(PHONEME_RULES)로 하드코딩돼
# 있던 내용을 그대로 옮긴 것이다(개발자가 아니어도 이 파일만 고치면 발음이
# 바뀌도록 데이터 파일로 분리 — Phase H 요구사항). 순서가 중요하다(더 긴
# 패턴이 먼저 매치되어야 함) — 리스트 순서가 곧 치환 순서다.
#
# pipeline/config_audio.py의 apply_pronunciation_rules()가 이 파일을 순서대로
# 적용한다.

rules:
  # ── 영문 약어 → 한글 발음 ─────────────────────────────────────────────
  - ["SK하이닉스", "에스케이하이닉스"]
  - ["SK ", "에스케이 "]
  - ["LG에너지솔루션", "엘지에너지솔루션"]
  - ["LG화학", "엘지화학"]
  - ["LG ", "엘지 "]
  - ["KB금융", "케이비금융"]
  - ["KB ", "케이비 "]
  - ["HD현대중공업", "에이치디현대중공업"]
  - ["HD현대일렉트릭", "에이치디현대일렉트릭"]
  - ["HD현대", "에이치디현대"]
  - ["HBM", "에이치비엠"]
  - ["OTT", "오티티"]
  - ["AI", "에이아이"]
  - ["ETF", "이티에프"]
  - ["ESS", "이에스에스"]
  - ["PCE", "피씨이"]
  - ["DSR", "디에스알"]
  - ["MOU", "엠오유"]
  - ["ADR", "에이디알"]
  - ["BPS", "비피에스"]
  - ["EPS", "이피에스"]
  - ["PER", "피이알"]
  - ["ROE", "알오이"]
  - ["POSCO", "포스코"]
  - ["KOSPI", "코스피"]
  - ["KOSDAQ", "코스닥"]
  - ["KrF", "케이알에프"]
  - ["ArF", "에이알에프"]
  - ["EUV", "이유브이"]
  - ["IPO", "아이피오"]
  - ["M&A", "엠앤에이"]
  - ["R&D", "알앤디"]
  - ["YoY", "와이오와이"]
  - ["QoQ", "큐오큐"]
  - ["BUY", "바이"]
  - ["Buy", "바이"]
  - ["MASH", "마쉬"]
  - ["CNS", "씨엔에스"]
  - ["RNAi", "알엔에이아이"]

  # ── 경음화 / 발음 교정 ───────────────────────────────────────────────
  - ["목표주가", "목표주까"]
  - ["주가", "주까"]
  - ["유가", "유까"]
  - ["고유가", "고유까"]
  - ["저유가", "저유까"]
  - ["국채", "국째"]
  - ["역대", "역때"]
  - ["격차", "격짜"]
  - ["적자", "적짜"]
  - ["특징", "특찡"]
  - ["실적", "실쩍"]
  - ["실쩍보다", "실적보다"]  # 역방향 예외 방지
  - ["발전", "발쩐"]
  - ["결정", "결쩡"]
  - ["절감", "절깜"]
  - ["신고가", "신고까"]
  - ["최고가", "최고까"]
  - ["최저가", "최저까"]
  - ["저가", "저까"]  # "최저가/저유가"보다 뒤에 둠(더 긴 패턴 우선 매치)
  - ["할 것", "할 껏"]
  - ["볼 수", "볼 쑤"]
  - ["될 것", "될 껏"]
  - ["있을", "이쓸"]

  # ── 숫자 표기 보조 ───────────────────────────────────────────────────
  - ["삼성전기", "삼성 전기"]  # TTS 오독 방지 (자막에는 원래대로)
